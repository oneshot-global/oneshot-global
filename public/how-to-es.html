            <h1 data-ja="3ステップで予定登録" data-en="Sync in 3 Simple Steps" data-de="In 3 einfachen Schritten synchronisieren" data-fr="Synchronisation en 3 étapes simples" data-es="Sincroniza en 3 sencillos pasos"></h1>
            <p class="guide-subtext" data-ja="あらゆる情報をカレンダーへ。手入力の手間をゼロにします。" data-en="Turn any info into digital events. Zero manual typing." data-de="Verwandeln Sie alle Informationen in digitale Termine. Keine manuelle Eingabe erforderlich." data-fr="Transformez n'importe quelle info en événements numériques. Zéro saisie manuelle." data-es="Convierte cualquier información en eventos digitales. Cero escritura manual."></p>

    <section class="how-to-content">
        <div class="container">
            <div class="step-card">
                <span class="step-num">STEP 01</span>
                <h3 data-ja="画像を用意する（またはテキストをコピー）" data-en="Prepare an Image (or Copy Text)" data-de="Bild vorbereiten (oder Text kopieren)" data-fr="Préparer une image (ou copier du texte)" data-es="Preparar una imagen (o copiar texto)"></h3>
                <p data-ja="予定が書かれたものを撮影するか、メールやSNSの画面をスクリーンショットします。メール本文などの長いテキストは、そのままコピペで貼り付けてもOKです。" data-en="Snap a photo of anything with a schedule, or take a screenshot of an email or social media. You can also simply copy and paste text, such as an email body." data-de="Fotografieren Sie einen Zeitplan oder machen Sie einen Screenshot von einer E-Mail oder sozialen Medien. Sie können Text, z. B. aus einer E-Mail, auch einfach kopieren und einfügen." data-fr="Prenez une photo d'un emploi du temps ou faites une capture d'écran d'un e-mail ou d'un réseau social. Vous pouvez aussi simplement copier-coller du texte, par exemple le corps d'un e-mail." data-es="Haz una foto de cualquier horario o toma una captura de pantalla de un email o red social. También puedes simplemente copiar y pegar texto, como el cuerpo de un email."></p>
                <div class="target-icons">
                    <span data-ja="📧 予約/確認メール" data-en="📧 Confirmation Emails" data-de="📧 Bestätigungs-E-Mails" data-fr="📧 E-mails de confirmation" data-es="📧 Emails de confirmación"></span>
                    <span data-ja="💬 LINE/チャット" data-en="💬 Line / Chat" data-de="💬 Messenger / Chat" data-fr="💬 Messagerie / Chat" data-es="💬 Mensajería / Chat"></span>
                    <span data-ja="🌐 Webサイト/SNS" data-en="🌐 Web / Social Media" data-de="🌐 Web / Soziale Medien" data-fr="🌐 Web / Réseaux Sociaux" data-es="🌐 Web / Redes Sociales"></span>
                    <span data-ja="📄 紙のプリント" data-en="📄 Paper Flyers" data-de="📄 Papierflyer" data-fr="📄 Flyers papier" data-es="📄 Folletos de papel"></span>
                </div>
                <div class="example-tag" data-ja="💡 コツ：文字が読めればOK！PCなら画像をドロップするだけ" data-en="💡 Tip: Works if text is readable! Just drop images on PC." data-de="💡 Tipp: Funktioniert, wenn der Text lesbar ist! Auf dem PC einfach Bilder ablegen." data-fr="💡 Conseil : Fonctionne si le texte est lisible ! Sur PC, déposez simplement les images." data-es="💡 Truco: ¡Funciona si el texto es legible! En PC, simplemente arrastra las imágenes."></div>
            </div>

            <div class="step-card">
                <span class="step-num">STEP 02</span>
                <h3 data-ja="AIが解析" data-en="AI Analysis" data-de="KI-Analyse" data-fr="Analyse par l'IA" data-es="Análisis por IA"></h3>
                <p data-ja="Gemini AIが画像をスキャンし、日時や場所を自動で抽出します。" data-en="Gemini AI scans the image and extracts the date, time, and location." data-de="Gemini KI scannt das Bild und extrahiert Datum, Uhrzeit und Ort." data-fr="L'IA Gemini scanne l'image et extrait la date, l'heure et le lieu." data-es="La IA Gemini escanea la imagen y extrae la fecha, la hora y la ubicación."></p>
                <p style="font-size: 0.8rem; color: var(--text-sub); margin-top: 10px;" data-ja="※画像データは解析完了後、即座に削除されます。" data-en="*Images are deleted immediately after analysis for your privacy." data-de="*Bilder werden nach der Analyse zum Schutz Ihrer Privatsphäre sofort gelöscht." data-fr="*Les images sont supprimées immédiatement après l'analyse pour votre confidentialité." data-es="*Las imágenes se eliminan inmediatamente después del análisis para su privacidad."></p>
            </div>

            <div class="step-card">
                <span class="step-num">STEP 03</span>
                <h3 data-ja="カレンダーで確認" data-en="Verify in Calendar" data-de="Im Kalender prüfen" data-fr="Vérifier dans le calendrier" data-es="Verificar en el calendario"></h3>

                <p class="warning-text" data-ja="⚠️ 最後に必ず日時が正しいか目視で確認してください。" data-en="⚠️ Always double-check the accuracy of the date and time." data-de="⚠️ Überprüfen Sie das Datum und die Uhrzeit am Ende immer noch einmal manuell." data-fr="⚠️ Vérifiez toujours manuellement l'exactitude de la date et de l'heure à la fin." data-es="⚠️ Al finalizar, comprueba siempre manualmente que la fecha y la hora sean correctas."></p>
            </div>

            <div class="notes-section">
                <div class="note-item">
                    <span class="note-icon">📄</span>
                    <div class="note-text">
                        <h4 data-ja="1枚につき、1つの予定（通常モード）" data-en="One Event per Image (Standard Mode)" data-de="Ein Ereignis pro Bild (Standardmodus)" data-fr="Un événement par image (mode standard)" data-es="Un evento por imagen (modo estándar)"></h4>
                        <p data-ja="幼稚園・保育園などの「日付×クラス」形式の月間予定表は、専用の月間予定表モード（β）で一括登録に対応しています。週間スケジュールなど、定型でない自由なレイアウトに複数の予定が混在する画像は現在サポート外です。" data-en="Grid-style monthly schedules in a fixed date-by-class format (e.g. from kindergartens) can be bulk-registered with the dedicated Monthly Grid Mode (β). Free-form layouts mixing multiple events, such as weekly schedules, are currently not supported." data-de="Monatspläne im festen Raster „Datum × Klasse“ (z. B. aus Kindergärten) können im Monatsplan-Modus (β) gesammelt registriert werden. Freie Layouts mit mehreren Terminen, etwa Wochenpläne, werden derzeit nicht unterstützt." data-fr="Les plannings mensuels au format fixe « date × classe » (p. ex. des écoles maternelles) peuvent être enregistrés en une fois avec le mode planning mensuel (β). Les mises en page libres mélangeant plusieurs événements, comme les plannings hebdomadaires, ne sont pas encore prises en charge." data-es="Los calendarios mensuales con formato fijo «fecha × clase» (p. ej. de guarderías) pueden registrarse en bloque con el modo de calendario mensual (β). Los diseños libres que mezclan varios eventos, como los horarios semanales, aún no son compatibles."></p>
                    </div>
                </div>
                <div class="note-item">
                    <span class="note-icon">🌱</span>
                    <div class="note-text">
                        <h4 data-ja="手書き文字は成長中" data-en="Handwriting is evolving" data-de="Handschrift-Erkennung in Entwicklung" data-fr="L'écriture manuscrite évolue" data-es="La escritura a mano está evolucionando"></h4>
                        <p data-ja="Gemini AIとともに日々学習中です。読み取りにくい場合は、活字（プリントやデジタル画面）をお試しください。" data-en="Learning daily with Gemini AI. If difficult to read, please try printed text or digital screens." data-de="Tägliche Weiterentwicklung mit Gemini KI. Falls schwer lesbar, verwenden Sie bitte gedruckten Text oder digitale Bildschirme." data-fr="Apprentissage quotidien avec l'IA Gemini. Si c'est difficile à lire, veuillez utiliser du texte imprimé ou des écrans numériques." data-es="Aprendizaje diario con la IA Gemini. Si es difícil de leer, por favor usa texto impreso o pantallas digitales."></p>
                    </div>
                </div>
                <div class="note-item">
                    <span class="note-icon">👀</span>
                    <div class="note-text">
                        <h4 data-ja="最後は目視でチェック" data-en="Final Visual Check" data-de="Abschließende Sichtprüfung" data-fr="Vérification visuelle finale" data-es="Comprobación visual final"></h4>
                        <p data-ja="AIが日時を読み間違える可能性があります。登録前に必ず内容が正しいか確認をお願いします。" data-en="AI may misread details. Please always ensure the information is correct before registration." data-de="Die KI könnte Details falsch interpretieren. Bitte stellen Sie vor der Registrierung immer sicher, dass die Informationen korrekt sind." data-fr="L'IA pourrait mal interpréter certains détails. Veuillez toujours vous assurer que les informations sont correctes avant l'enregistrement." data-es="La IA podría interpretar mal algunos detalles. Por favor, asegúrate siempre de que la información sea correcta antes del registro."></p>
                    </div>
                </div>
            </div>

            <div class="next-step-box">
                <h4 data-ja="準備はできましたか？" data-en="Ready to start?" data-de="Bereit zum Starten?" data-fr="Prêt à commencer ?" data-es="¿Listo para empezar?"></h4>
