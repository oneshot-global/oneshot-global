    <script>
        // ログイン済みチェック → /app にリダイレクト
        (function() {
            const subId = localStorage.getItem('oneshot_subId');
            const hasCookie = document.cookie.includes('session');
            if (subId || hasCookie) {
                window.location.href = '/app';
            }
        })();

        function openModal(type) {
            const modal = document.getElementById('legal-modal');
            const iframe = document.getElementById('modal-iframe');
            iframe.src = '/' + type;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function openSctaModal() {
            const modal = document.getElementById('legal-modal');
            const iframe = document.getElementById('modal-iframe');
            const isEn = (localStorage.getItem('preferredLanguage') || navigator.language.slice(0, 2)) !== 'ja';
            iframe.src = isEn ? '/tokusho-en.html' : '/tokusho.html';
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('legal-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('legal-modal');
            if (event.target == modal) closeModal();
        }
    </script>
